name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Test environment'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - preprod
          - prod
          - bu
      test_type:
        description: 'Type of tests to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - ui
          - api
          - all

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      env:
        NORMAL_USERNAME: ${{ secrets.NORMAL_USERNAME }}
        NORMAL_PASSWORD: ${{ secrets.NORMAL_PASSWORD }}
        NORMAL_TOTP_SECRET: ${{ secrets.NORMAL_TOTP_SECRET }}
        XERO_USERNAME: ${{ secrets.XERO_USERNAME }}
        XERO_PASSWORD: ${{ secrets.XERO_PASSWORD }}
        XERO_TOTP_SECRET: ${{ secrets.XERO_TOTP_SECRET }}
      run: |
        ENV=${{ github.event.inputs.environment || 'qa' }}
        TEST_TYPE=${{ github.event.inputs.test_type || 'smoke' }}
        if [ "$TEST_TYPE" = "all" ]; then
          ENV=$ENV npm run test
        else
          ENV=$ENV npm run test:$TEST_TYPE
        fi
    - name: Report failures to JIRA
      if: always()
      env:
        JIRA_HOST: ${{ secrets.JIRA_HOST }}
        JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
        JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
        JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      run: npm run jira:report
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results
        path: allure-results/
        retention-days: 30